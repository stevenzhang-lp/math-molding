<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>2025国赛A题-精简空间布局</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; }
        #legend {
            position: absolute; top: 20px; left: 20px; color: #fff;
            font-family: sans-serif; background: rgba(0,0,0,0.8);
            padding: 12px; border-radius: 6px; border: 1px solid #444;
            pointer-events: none; font-size: 13px;
        }
        .item { margin-bottom: 4px; display: flex; align-items: center; }
        .color-box { width: 8px; height: 8px; margin-right: 8px; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="legend">
        <div style="font-weight:bold; margin-bottom:8px;">空间布局 (Z轴向上)</div>
        <div class="item"><span class="color-box" style="background: #ffff00;"></span>假目标 (0,0,0)</div>
        <div class="item"><span class="color-box" style="background: #00ff00;"></span>真目标 (0,200,0)</div>
        <div class="item"><span class="color-box" style="background: #ff4444;"></span>导弹 M1-M3</div>
        <div class="item"><span class="color-box" style="background: #00aaff;"></span>无人机 FY1-FY5</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 10, 200000);
        camera.up.set(0, 0, 1); // Z轴向上
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 辅助网格
        const grid = new THREE.GridHelper(40000, 40, 0x222222, 0x111111);
        grid.rotation.x = Math.PI / 2;
        scene.add(grid);

        // 坐标轴
        scene.add(new THREE.AxesHelper(3000));

        // 通用点绘制函数
        const addSmallPoint = (x, y, z, color, size = 60) => {
            const mesh = new THREE.Mesh(
                new THREE.SphereGeometry(size),
                new THREE.MeshBasicMaterial({ color })
            );
            mesh.position.set(x, y, z);
            scene.add(mesh);
        };

        // 1. 目标点 (稍微大一点点以示区分)
        addSmallPoint(0, 0, 0, 0xffff00, 100);    // 假目标 
        addSmallPoint(0, 200, 0, 0x00ff00, 100);  // 真目标 

        // 2. 导弹 
        const missiles = [
            [20000, 0, 2000], [19000, 600, 2100], [18000, -600, 1900]
        ];
        missiles.forEach(p => addSmallPoint(...p, 0xff4444, 80));

        // 3. 无人机 
        const uavs = [
            [17800, 0, 1800], [12000, 1400, 1400], [6000, -3000, 700],
            [11000, 2000, 1800], [13000, -2000, 1300]
        ];
        uavs.forEach(p => addSmallPoint(...p, 0x00aaff, 70));

        // 相机初始视角
        camera.position.set(22000, 12000, 8000);
        controls.target.set(8000, 0, 1000);
        controls.update();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
